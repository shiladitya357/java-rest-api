apiVersion: apps/v1
kind: Deployment
metadata:
  name: java-rest-api
  labels:
    app: java-rest-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: java-rest-api
  template:
    metadata:
      labels:
        app: java-rest-api
    spec:
      containers:
        - name: java-rest-api
          image: $(IMAGE_NAME)
          ports:
            - name: http
              containerPort: 5050
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
