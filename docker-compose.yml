services:
  java-rest-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: java-rest-api
    ports:
      - "5050:5050"
    volumes:
      - ./log:/app/log
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5050/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
