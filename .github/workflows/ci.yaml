name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: 

env:
  JDK_VERSION: 21
  IMAGE_NAME_TAGGED: shiladitya997/java-rest-api:${{ github.sha }}
  IMAGE_NAME_LATEST: shiladitya997/java-rest-api:latest

permissions: 
  contents: read

jobs:
  build-scan-upload:
    name: Java REST APP CI - Build, Scan, Dockerize, Upload
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Set up JDK
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JDK_VERSION }}
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn clean package

    - name: Test with Maven
      run: mvn clean test

    - name: Build Docker Image
      run: |
        docker build -t ${{ env.IMAGE_NAME_TAGGED }} -t ${{ env.IMAGE_NAME_LATEST }} .

    - name: Scan Docker Image
      uses: aquasecurity/trivy-action@master
      with:
        image-ref: '${{ env.IMAGE_NAME_TAGGED }}:'
        format: 'table'
        exit-code: 0

    - name: Login to Dockerhub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_PASSWORD }}

    - name: Upload Docker Image to Dockerhub
      if: github.event_name == 'push' || github.ref == 'refs/heads/main'
      run: |
        docker push ${{ env.IMAGE_NAME_TAGGED }}
        docker push ${{ env.IMAGE_NAME_LATEST }}

    - name: Logout from DockerHub
      run: |
        docker logout

    - name: Cleanup local docker images
      run: |
        docker rmi ${{ env.IMAGE_NAME_TAGGED }} || true
        docker rmi ${{ env.IMAGE_NAME_LATEST }} || true

    - name: Notify on Failure
      if: failure()
      run: |
        echo "Build failed! Please check the logs for details."
        
    - name: Publish Summary
      if: success()
      run: |
          echo "- Image Name: ${{ env.IMAGE_NAME_TAGGED }}"
          echo "- Image Name: ${{ env.IMAGE_NAME_LATEST }}:latest"
